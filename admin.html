<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DR CELL - Panel de Administración</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --card: #12121c;
      --primary: #00f0ff;
      --neon-green: #00ff88;
      --neon-purple: #b000ff;
      --neon-pink: #ff00e5;
      --text: #ffffff;
      --muted: #8a8fa8;
      --danger: #ff3860;
      --border: rgba(0, 240, 255, 0.08);
      --radius: 18px;
      --transition: 0.3s ease;
      --gradient: linear-gradient(135deg, #00f0ff 0%, #b000ff 50%, #ff00e5 100%);
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .container { width: min(900px, 92%); margin: 0 auto; padding: 20px 0; }

    .bg-blur {
      position: fixed; inset: 0; z-index: -1; overflow: hidden;
      background: radial-gradient(circle at 30% 20%, rgba(0,240,255,0.08), transparent 60%);
    }

    /* LOGIN */
    .login-screen {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 30px;
      width: 100%; max-width: 400px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .login-logo {
      width: 70px; height: 70px; margin: 0 auto 20px;
      background: var(--gradient); border-radius: 20px;
      display: grid; place-items: center; font-size: 2rem; color: white;
    }
    .login-box h1 { font-size: 1.6rem; margin-bottom: 8px; }
    .login-box h1 span { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .login-box p { color: var(--muted); margin-bottom: 24px; }

    input[type="password"] {
      width: 100%; padding: 14px; margin-bottom: 10px;
      background: rgba(0,240,255,0.05); border: 1px solid rgba(0,240,255,0.15);
      border-radius: 12px; color: white; font-size: 1rem;
    }
    .login-error { color: var(--danger); margin: 10px 0; font-size: 0.85rem; min-height: 20px; }

    button {
      width: 100%; padding: 14px; background: var(--gradient);
      color: white; border: none; border-radius: 999px;
      font-weight: 700; font-size: 1rem; cursor: pointer;
      transition: 0.3s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(0,240,255,0.4); }

    /* ADMIN */
    .admin-panel { display: none; }
    .admin-panel.visible { display: block; }

    .admin-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 25px; flex-wrap: wrap; gap: 15px;
    }
    .admin-title {
      display: flex; align-items: center; gap: 12px;
    }
    .admin-title div {
      background: var(--gradient); width: 50px; height: 50px;
      border-radius: 14px; display: grid; place-items: center;
      font-size: 1.4rem; color: white;
    }
    .admin-title h1 { font-size: 1.4rem; }

    .btn { padding: 10px 18px; border-radius: 999px; font-weight: 600; cursor: pointer; }

    .logout-btn { background: rgba(255,56,96,0.15); color: var(--danger); border: 1px solid rgba(255,56,96,0.3); }

    /* Formulario */
    .form-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 25px; margin-bottom: 30px;
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .form-group { display: flex; flex-direction: column; }
    .form-group.full { grid-column: span 2; }
    .form-group label { margin-bottom: 6px; font-size: 0.85rem; color: var(--muted); font-weight: 600; }
    .form-group input, .form-group textarea {
      padding: 12px; background: rgba(0,240,255,0.05);
      border: 1px solid rgba(0,240,255,0.15); border-radius: 12px;
      color: white; font-family: inherit;
    }
    .form-group textarea { min-height: 80px; resize: vertical; }

    .btn-group { margin-top: 20px; display: flex; gap: 12px; justify-content: flex-end; }
    .btn-add { background: linear-gradient(135deg, #00ff88, #00cc6a); color: #0a0a0f; font-weight: 700; }
    .btn-cancel { background: transparent; border: 1px solid #555; color: var(--muted); }

    /* Lista */
    .product-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 15px; margin-bottom: 12px;
      display: flex; align-items: center; gap: 15px;
    }
    .product-item img {
      width: 60px; height: 60px; object-fit: cover; border-radius: 10px;
    }
    .product-info { flex: 1; }
    .product-info h3 { font-size: 1rem; margin-bottom: 4px; }
    .product-info p { font-size: 0.8rem; color: var(--muted); }
    .product-price { font-weight: 700; color: var(--primary); margin-top: 5px; }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #1e1e2e; color: white; padding: 12px 20px;
      border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
      display: none; align-items: center; gap: 10px; z-index: 1000;
    }
    .toast.show { display: flex; animation: toastAnim 0.3s; }
    @keyframes toastAnim { from { transform: translate(-50%, 50px); } to { transform: translate(-50%, 0); } }
  </style>
</head>
<body>

  <div class="bg-blur"></div>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <div class="login-logo"><i class="fas fa-lock"></i></div>
      <h1>DR <span>CELL</span></h1>
      <p>Panel de Administración</p>
      <input type="password" id="passInput" placeholder="Contraseña" onkeypress="if(event.key==='Enter') login()">
      <div class="login-error" id="errorMsg"></div>
      <button onclick="login()">Entrar</button>
    </div>
  </div>

  <!-- PANEL -->
  <div class="admin-panel" id="adminPanel">
    <div class="container">
      <div class="admin-header">
        <div class="admin-title">
          <div><i class="fas fa-mobile-screen-button"></i></div>
          <h1>DR CELL Admin</h1>
        </div>
        <div>
          <a href="index.html" target="_blank" class="btn" style="margin-right:10px;">Ver Tienda</a>
          <button class="btn logout-btn" onclick="logout()">Salir</button>
        </div>
      </div>

      <div class="form-card">
        <h2 id="formTitle">Agregar Producto</h2>
        <div class="form-grid">
          <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="nombre" placeholder="Ej: Cargador Tipo C">
          </div>
          <div class="form-group">
            <label>Precio</label>
            <input type="text" id="precio" placeholder="Ej: $15 USD">
          </div>
          <div class="form-group full">
            <label>Descripción</label>
            <textarea id="descripcion" placeholder="Describe el producto..."></textarea>
          </div>
          <div class="form-group full">
            <label>URL de Imagen (opcional)</label>
            <input type="text" id="imagen" placeholder="https://..." oninput="previewImage()">
            <div id="preview" style="margin-top:10px; display:none;">
              <img id="previewImg" style="max-width:180px; border-radius:8px;">
            </div>
          </div>
        </div>
        <div class="btn-group">
          <button class="btn btn-cancel" id="btnCancelar" onclick="cancelar()" style="display:none;">Cancelar</button>
          <button class="btn btn-add" onclick="guardarProducto()" id="btnGuardar">Agregar Producto</button>
        </div>
      </div>

      <h2 style="margin:20px 0 15px;">Productos Publicados (<span id="count">0</span>)</h2>
      <div id="listaProductos"></div>
    </div>
  </div>

  <div class="toast" id="toast"><i class="fas fa-check-circle"></i> <span id="toastText"></span></div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDR_7eWhH_uu1Ad85FGl5G0HdxxHXzUpxE",
      authDomain: "drcell-tienda.firebaseapp.com",
      databaseURL: "https://drcell-tienda-default-rtdb.firebaseio.com",
      projectId: "drcell-tienda",
      storageBucket: "drcell-tienda.firebasestorage.app",
      messagingSenderId: "578229626967",
      appId: "1:578229626967:web:7f71da8803e83e35199b12"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const productosRef = ref(db, 'productos');

    window.db = db;
    window.productosRef = productosRef;
  </script>

  <script>
    const PASSWORD = "drcell2025";
    let editandoId = null;

    function login() {
      const pass = document.getElementById("passInput").value;
      const error = document.getElementById("errorMsg");

      if (pass === PASSWORD) {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("adminPanel").classList.add("visible");
        cargarProductos();
      } else {
        error.textContent = "Contraseña incorrecta";
        document.getElementById("passInput").value = "";
      }
    }

    function logout() {
      location.reload();
    }

    function previewImage() {
      const url = document.getElementById("imagen").value;
      const preview = document.getElementById("preview");
      const img = document.getElementById("previewImg");
      if (url) {
        img.src = url;
        preview.style.display = "block";
      } else {
        preview.style.display = "none";
      }
    }

    async function guardarProducto() {
      const nombre = document.getElementById("nombre").value.trim();
      const precio = document.getElementById("precio").value.trim();
      const descripcion = document.getElementById("descripcion").value.trim();
      const imagen = document.getElementById("imagen").value.trim();

      if (!nombre || !precio || !descripcion) {
        toast("Faltan campos obligatorios", true);
        return;
      }

      const producto = { nombre, precio, descripcion, imagen, fecha: Date.now() };

      try {
        if (editandoId) {
          await update(ref(window.db, 'productos/' + editandoId), producto);
          toast("Producto actualizado correctamente");
          editandoId = null;
          document.getElementById("btnGuardar").textContent = "Agregar Producto";
          document.getElementById("formTitle").textContent = "Agregar Producto";
        } else {
          await push(window.productosRef, producto);
          toast("Producto publicado correctamente");
        }
        limpiarFormulario();
        cargarProductos();
      } catch (e) {
        toast("Error al guardar", true);
        console.error(e);
      }
    }

    function editarProducto(id, prod) {
      editandoId = id;
      document.getElementById("nombre").value = prod.nombre;
      document.getElementById("precio").value = prod.precio;
      document.getElementById("descripcion").value = prod.descripcion;
      document.getElementById("imagen").value = prod.imagen || "";
      document.getElementById("formTitle").textContent = "Editar Producto";
      document.getElementById("btnGuardar").textContent = "Guardar Cambios";
      previewImage();
      window.scrollTo(0, 0);
    }

    function eliminarProducto(id) {
      if (confirm("¿Eliminar este producto?")) {
        remove(ref(window.db, 'productos/' + id));
        toast("Producto eliminado");
      }
    }

    function cargarProductos() {
      onValue(window.productosRef, (snapshot) => {
        const data = snapshot.val();
        const lista = document.getElementById("listaProductos");
        const count = document.getElementById("count");
        lista.innerHTML = "";

        if (!data) {
          count.textContent = 0;
          lista.innerHTML = "<p style='color:#666; text-align:center; padding:30px;'>No hay productos aún</p>";
          return;
        }

        const productos = Object.entries(data).reverse();
        count.textContent = productos.length;

        productos.forEach(([id, prod]) => {
          lista.innerHTML += `
            <div class="product-item">
              <div style="width:60px;height:60px;background:#222;border-radius:8px;overflow:hidden;">
                ${prod.imagen ? `<img src="${prod.imagen}" style="width:100%;height:100%;object-fit:cover;">` : '<i class="fas fa-box" style="font-size:24px;color:#555;margin:18px;"></i>'}
              </div>
              <div class="product-info">
                <h3>${prod.nombre}</h3>
                <p>${prod.descripcion}</p>
                <div class="price-tag" style="color:var(--neon-green);font-weight:700;">${prod.precio}</div>
              </div>
              <div>
                <button onclick='editarProducto("${id}", ${JSON.stringify(prod)})' style="margin-right:8px;">✏️</button>
                <button onclick='eliminarProducto("${id}")' style="color:#ff3860;">🗑️</button>
              </div>
            </div>`;
        });
      });
    }

    function limpiarFormulario() {
      document.getElementById("nombre").value = "";
      document.getElementById("precio").value = "";
      document.getElementById("descripcion").value = "";
      document.getElementById("imagen").value = "";
      document.getElementById("preview").style.display = "none";
    }

    function toast(mensaje, error = false) {
      const toast = document.getElementById("toast");
      document.getElementById("toastText").innerHTML = mensaje;
      toast.style.borderLeft = error ? "4px solid #ff3860" : "4px solid #00ff88";
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 3000);
    }

    // Auto-login si ya estaba logueado
    if (sessionStorage.getItem("adminLogged") === "true") {
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("adminPanel").classList.add("visible");
    }
  </script>
</body>
</html>
