<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DR CELL - Admin</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0a0a0f;--card:#12121c;--primary:#00f0ff;
      --neon-green:#00ff88;--neon-purple:#b000ff;--neon-pink:#ff00e5;
      --text:#ffffff;--muted:#8a8fa8;--danger:#ff3860;
      --border:rgba(0,240,255,0.08);--radius:18px;--transition:0.3s ease;
      --gradient:linear-gradient(135deg,#00f0ff 0%,#b000ff 50%,#ff00e5 100%);
    }
    body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
    .container{width:min(900px,92%);margin:0 auto}
    .bg-blur{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
    .bg-blur::before,.bg-blur::after{content:"";position:absolute;width:400px;height:400px;border-radius:50%;filter:blur(120px);opacity:.1}
    .bg-blur::before{background:var(--primary);top:-100px;left:-120px}
    .bg-blur::after{background:var(--neon-pink);right:-100px;bottom:-80px}

    /* LOGIN */
    .login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;z-index:1}
    .login-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:40px 36px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.5);text-align:center}
    .login-logo{width:70px;height:70px;border-radius:20px;background:var(--gradient);display:grid;place-items:center;font-size:1.8rem;color:white;margin:0 auto 20px;box-shadow:0 0 30px rgba(0,240,255,.25)}
    .login-box h1{font-size:1.5rem;margin-bottom:6px}
    .login-box h1 span{background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .login-box .sub{color:var(--muted);font-size:.88rem;margin-bottom:28px}
    .login-box label{display:block;text-align:left;font-size:.82rem;color:var(--muted);margin-bottom:6px;font-weight:600}
    .pass-wrap{position:relative;margin-bottom:8px}
    .pass-wrap input{width:100%;padding:13px 46px 13px 16px;background:rgba(0,240,255,.04);border:1px solid rgba(0,240,255,.12);border-radius:12px;color:white;font-size:1rem;font-family:'Poppins',sans-serif;outline:none;transition:var(--transition)}
    .pass-wrap input:focus{border-color:var(--primary);box-shadow:0 0 15px rgba(0,240,255,.1)}
    .eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--muted);cursor:pointer;transition:var(--transition)}
    .eye-btn:hover{color:var(--primary)}
    .login-error{color:var(--danger);font-size:.8rem;min-height:22px;margin-bottom:10px;text-align:left}
    .login-btn{width:100%;padding:14px;background:var(--gradient);color:white;border:none;border-radius:999px;font-size:1rem;font-weight:700;font-family:'Poppins',sans-serif;cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center;gap:8px}
    .login-btn:hover{transform:translateY(-2px);box-shadow:0 0 35px rgba(0,240,255,.35)}

    /* PANEL */
    .admin-panel{display:none;padding:30px 0 60px;position:relative;z-index:1}
    .admin-panel.visible{display:block;animation:fadeIn .4s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    /* HEADER */
    .admin-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid rgba(0,240,255,.06)}
    .admin-header-left{display:flex;align-items:center;gap:14px}
