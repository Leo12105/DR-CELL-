<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DR CELL Habana | Servicio Técnico Profesional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --negro: #0a0a0f;
            --negro-suave: #131320;
            --gris-oscuro: #1f1f2e;
            --cyan: #06b6d4;
            --cyan-brillante: #22d3ee;
            --cyan-claro: #67e8f9;
            --blanco-oscuro: #e2e8f0;
            --gris-claro: #94a3b8;
            --dorado: #fbbf24;
        }

        html, body {
            min-height: 100%;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #131320 50%, #1f1f2e 100%);
            background-attachment: fixed;
            color: var(--blanco-oscuro);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 25px 15px 10px;
            position: relative;
            z-index: 10;
        }
        .header h1 {
            font-size: 2rem;
            letter-spacing: 4px;
            color: var(--blanco-oscuro);
            font-weight: 800;
        }
        .header h1 span { color: var(--cyan-brillante); text-shadow: 0 0 15px rgba(34,211,238,0.5); }
        .header p {
            color: var(--gris-claro);
            font-size: 0.9rem;
            margin-top: 5px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* MENÚ */
        .botones-menu {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            background: rgba(10,10,15,0.95);
            backdrop-filter: blur(15px);
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            border-bottom: 1px solid rgba(34,211,238,0.2);
        }
        .btn-menu {
            background: rgba(226,232,240,0.05);
            border: 2px solid transparent;
            color: var(--blanco-oscuro);
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }
        .btn-menu:hover { background: rgba(34,211,238,0.1); transform: translateY(-2px); }
        .btn-menu.active {
            background: var(--cyan);
            border-color: var(--cyan-brillante);
            box-shadow: 0 0 20px rgba(34,211,238,0.5);
        }

        /* CONTENIDO */
        .contenido {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .seccion {
            display: none;
            width: 100%;
            max-width: 1100px;
            animation: fadeIn 0.6s;
        }
        .seccion.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HERO */
        .hero {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 40px;
            align-items: center;
            padding: 40px 20px;
            min-height: 70vh;
        }

        .hero-text {
            animation: slideLeft 1s;
        }
        @keyframes slideLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .badge-top {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(34,211,238,0.1);
            border: 1px solid var(--cyan);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            color: var(--cyan-brillante);
            margin-bottom: 20px;
            font-weight: 600;
        }
        .badge-top i { color: var(--dorado); }

        .hero-text h1 {
            font-size: 3.2rem;
            line-height: 1.1;
            font-weight: 800;
            margin-bottom: 20px;
            color: white;
        }
        .hero-text h1 .highlight {
            background: linear-gradient(135deg, var(--cyan), var(--cyan-brillante));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-text .descripcion {
            font-size: 1.05rem;
            color: var(--gris-claro);
            margin-bottom: 30px;
            line-height: 1.7;
            max-width: 500px;
        }

        .cta-botones {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 35px;
        }
        .btn-cta {
            padding: 14px 28px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .btn-cta:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(0,0,0,0.6); }
        .btn-primary {
            background: linear-gradient(135deg, #25d366, #1ea952);
        }
        .btn-secondary {
            background: rgba(34,211,238,0.1);
            border: 2px solid var(--cyan);
            color: var(--cyan-brillante);
            backdrop-filter: blur(10px);
        }
        .btn-secondary:hover { background: rgba(34,211,238,0.2); }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding-top: 25px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .stat-item h3 {
            font-size: 2rem;
            color: var(--cyan-brillante);
            font-weight: 800;
            margin-bottom: 4px;
            text-shadow: 0 0 10px rgba(34,211,238,0.3);
        }
        .stat-item p {
            font-size: 0.8rem;
            color: var(--gris-claro);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* TELÉFONO HERO */
        .hero-phone {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            animation: slideRight 1s;
        }
        @keyframes slideRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .phone-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(34,211,238,0.4) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 0.4; }
        }

        .hero-phone svg {
            width: 280px;
            height: auto;
            filter: drop-shadow(0 25px 50px rgba(34,211,238,0.3));
            position: relative;
            z-index: 2;
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
            padding: 0 20px 40px;
        }
        .feature-card {
            background: rgba(31,31,46,0.6);
            border: 1px solid rgba(34,211,238,0.15);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            transition: all 0.3s;
        }
        .feature-card:hover {
            transform: translateY(-5px);
            background: rgba(31,31,46,0.9);
            border-color: var(--cyan);
            box-shadow: 0 10px 30px rgba(34,211,238,0.2);
        }
        .feature-card .icon-box {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--cyan), var(--cyan-brillante));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 1.5rem;
            color: white;
            box-shadow: 0 5px 20px rgba(34,211,238,0.4);
        }
        .feature-card h4 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: white;
            font-weight: 600;
        }
        .feature-card p {
            font-size: 0.85rem;
            color: var(--gris-claro);
            line-height: 1.5;
        }

        /* TARJETA GENERAL */
        .card {
            background: rgba(31,31,46,0.6);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(34,211,238,0.15);
            width: 100%;
        }
        .card h2 {
            text-align: center;
            margin-bottom: 25px;
            color: var(--cyan-brillante);
            font-size: 1.6rem;
            font-weight: 700;
        }

        /* SERVICIOS */
        .categoria-titulo {
            font-size: 1.3rem;
            color: var(--cyan-brillante);
            margin: 25px 0 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(34,211,238,0.3);
            font-weight: 600;
        }
        .categoria-titulo:first-of-type { margin-top: 0; }

        .servicios-lista {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }
        .servicio-item {
            background: rgba(10,10,15,0.6);
            padding: 15px;
            border-radius: 12px;
            border-left: 4px
